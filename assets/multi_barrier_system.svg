<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-label="사용후핵연료 처분을 위한 다중방벽 시스템 도식">
  <defs>
    <linearGradient id="canister" x1="0" x2="1">
      <stop offset="0" stop-color="#d5e1ea"/>
      <stop offset=".52" stop-color="#f8fbfd"/>
      <stop offset="1" stop-color="#8ca2b5"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" x2="1">
      <stop offset="0" stop-color="#a65c2d"/>
      <stop offset=".55" stop-color="#f0b36f"/>
      <stop offset="1" stop-color="#8a4f2c"/>
    </linearGradient>
    <linearGradient id="rock" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d8a679"/>
      <stop offset="1" stop-color="#a56947"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" x2="1">
      <stop offset="0" stop-color="#a6d36f"/>
      <stop offset="1" stop-color="#78b65e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="11" stdDeviation="10" flood-color="#3c4a5b" flood-opacity=".16"/>
    </filter>
    <style>
      .title { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 24px; font-weight: 900; fill: #344257; }
      .label { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 15px; font-weight: 900; fill: #344257; }
      .small { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 12px; font-weight: 850; fill: #344257; }
      .chip { fill: rgba(255,255,255,.88); stroke: rgba(94,115,138,.25); stroke-width: 1.2; }
      .darkchip { fill: rgba(52,66,87,.72); }
      .blackpill { fill: #050505; }
      .white { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 12px; font-weight: 900; fill: #fff; }
      .pillwhite { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 15px; font-weight: 900; fill: #fff; }
      .guide { stroke: #8f9eaa; stroke-width: 2.4; stroke-dasharray: 4 6; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="980" height="420" rx="30" fill="#fffaf1"/>
  <rect x="34" y="17" width="318" height="42" rx="21" fill="#fffaf1" stroke="#111" stroke-width="2"/>
  <text x="193" y="45" text-anchor="middle" class="title">사용후핵연료 심층처분 개념도</text>

  <g transform="translate(44 104)" filter="url(#softShadow)">
    <rect x="0" y="18" width="78" height="204" rx="24" fill="#e5f2fb" stroke="#7c94aa" stroke-width="4"/>
    <path d="M39 33 C27 65 52 84 39 114 C26 144 52 166 36 201" fill="none" stroke="#ad7847" stroke-width="9" stroke-linecap="round"/>
    <rect x="-18" y="242" width="114" height="28" rx="14" class="blackpill"/>
    <text x="39" y="262" text-anchor="middle" class="pillwhite">사용후핵연료</text>
  </g>

  <g transform="translate(180 86)" filter="url(#softShadow)">
    <rect x="0" y="28" width="128" height="236" rx="28" fill="url(#canister)" stroke="#5d7084" stroke-width="5"/>
    <rect x="32" y="54" width="64" height="184" rx="17" fill="#fff8ed" stroke="#45576a" stroke-width="3"/>
    <g stroke="#9f6e44" stroke-width="4">
      <line x1="46" y1="73" x2="46" y2="220"/>
      <line x1="64" y1="73" x2="64" y2="220"/>
      <line x1="82" y1="73" x2="82" y2="220"/>
    </g>
    <rect x="30" y="0" width="68" height="24" rx="12" class="chip"/>
    <text x="64" y="17" text-anchor="middle" class="small">피복관</text>
    <rect x="17" y="284" width="94" height="28" rx="14" class="blackpill"/>
    <text x="64" y="304" text-anchor="middle" class="pillwhite">처분용기</text>
  </g>

  <g transform="translate(366 78)" filter="url(#softShadow)">
    <path d="M0 250 L0 56 L84 0 L168 56 L168 250 Z" fill="url(#copper)" stroke="#8d5c3c" stroke-width="4"/>
    <path d="M84 62 C116 71 139 101 139 137 C139 184 106 219 84 246 C62 219 29 184 29 137 C29 101 52 71 84 62Z" fill="#ffdd64" stroke="#a98731" stroke-width="4"/>
    <rect x="72" y="130" width="24" height="88" rx="8" fill="#6d8192"/>
    <rect x="38" y="22" width="92" height="24" rx="12" class="chip"/>
    <text x="84" y="39" text-anchor="middle" class="small">뒷채움재</text>
    <rect x="50" y="58" width="68" height="24" rx="12" class="chip"/>
    <text x="84" y="75" text-anchor="middle" class="small">완충재</text>
    <rect x="23" y="274" width="122" height="28" rx="14" class="blackpill"/>
    <text x="84" y="294" text-anchor="middle" class="pillwhite">공학적 방벽</text>
  </g>

  <g stroke="#a9b5bf" stroke-width="3" stroke-linecap="round">
    <path d="M128 224 H168"/>
    <path d="M320 224 H354"/>
    <path d="M548 224 H586"/>
  </g>

  <g transform="translate(598 66)" filter="url(#softShadow)">
    <path d="M0 86 L70 50 L164 56 L252 22 L342 54 L342 332 L0 332 Z" fill="url(#rock)" stroke="#9a6748" stroke-width="4"/>
    <path d="M0 86 L70 50 L164 56 L252 22 L342 54 L342 92 L0 124 Z" fill="url(#grass)" stroke="#7ba45b" stroke-width="3"/>
    <g fill="#f1f4f6" stroke="#8090a0" stroke-width="2">
      <rect x="50" y="58" width="52" height="24" rx="3"/>
      <rect x="110" y="52" width="44" height="20" rx="3"/>
      <rect x="238" y="46" width="58" height="22" rx="3"/>
    </g>
    <g stroke="#738595" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M108 76 V238"/>
      <path d="M136 78 V250"/>
      <path d="M100 238 C145 255 213 255 274 236"/>
      <path d="M86 276 C145 292 215 290 292 268"/>
    </g>
    <g stroke="#b99a59" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M126 236 H272"/>
      <path d="M118 274 H288"/>
      <path d="M146 224 V288"/>
      <path d="M180 224 V288"/>
      <path d="M214 224 V288"/>
      <path d="M248 224 V288"/>
    </g>
    <path d="M290 92 C238 130 252 173 308 176 C356 178 353 242 292 270" fill="none" stroke="#7b5f42" stroke-width="7" opacity=".72" stroke-linecap="round"/>
    <g fill="#4f9d62">
      <circle cx="222" cy="28" r="8"/><rect x="219" y="35" width="6" height="19" rx="3"/>
      <circle cx="242" cy="42" r="7"/><rect x="239" y="48" width="5" height="17" rx="2"/>
      <circle cx="267" cy="34" r="7"/><rect x="264" y="40" width="5" height="18" rx="2"/>
    </g>
    <rect x="35" y="24" width="144" height="26" rx="13" class="chip"/>
    <text x="107" y="42" text-anchor="middle" class="small">처분용기 포장시설</text>
    <rect x="202" y="116" width="64" height="26" rx="13" class="darkchip"/>
    <text x="234" y="134" text-anchor="middle" class="white">수직갱</text>
    <rect x="128" y="296" width="156" height="28" rx="14" class="darkchip"/>
    <text x="206" y="315" text-anchor="middle" class="white">처분터널 및 처분공</text>
    <text x="170" y="346" text-anchor="middle" class="label">자연 방벽</text>
  </g>
</svg>
