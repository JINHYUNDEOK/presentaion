<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="다중방벽 시스템 도식">
  <defs>
    <linearGradient id="soil" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e5b588"/>
      <stop offset="1" stop-color="#b97951"/>
    </linearGradient>
    <linearGradient id="rock" x1="0" x2="1">
      <stop offset="0" stop-color="#d1a47e"/>
      <stop offset="1" stop-color="#9b674b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#314052" flood-opacity=".18"/>
    </filter>
    <style>
      .label { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 15px; font-weight: 900; fill: #344257; }
      .title { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 24px; font-weight: 900; fill: #344257; }
      .micro { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 12px; font-weight: 850; fill: #344257; }
      .chip { fill: rgba(255,255,255,.82); stroke: rgba(115,139,161,.24); stroke-width: 1.4; }
      .darkchip { fill: rgba(52,66,87,.60); }
      .whitetext { font-family: Pretendard, Malgun Gothic, sans-serif; font-size: 12px; font-weight: 850; fill: #fff; }
    </style>
  </defs>

  <rect width="900" height="420" rx="30" fill="#fffaf1"/>
  <text x="36" y="46" class="title">다중방벽 시스템</text>

  <g transform="translate(46 112)" filter="url(#shadow)">
    <rect x="0" y="0" width="84" height="210" rx="24" fill="#d8e8f3" stroke="#738ba1" stroke-width="4"/>
    <path d="M42 14 C29 45 58 70 41 100 C26 126 54 148 38 180" fill="none" stroke="#a97748" stroke-width="10" stroke-linecap="round"/>
    <text x="42" y="248" text-anchor="middle" class="label">사용후핵연료</text>
  </g>

  <g transform="translate(178 96)" filter="url(#shadow)">
    <rect x="28" y="-30" width="64" height="24" rx="12" class="chip"/>
    <text x="60" y="-13" text-anchor="middle" class="micro">피복관</text>
    <rect x="0" y="0" width="120" height="240" rx="26" fill="#7b8d9d" stroke="#546576" stroke-width="5"/>
    <rect x="29" y="26" width="62" height="188" rx="18" fill="#f3efe4" stroke="#304052" stroke-width="3"/>
    <g stroke="#9d6b44" stroke-width="4">
      <line x1="42" y1="42" x2="42" y2="198"/>
      <line x1="58" y1="42" x2="58" y2="198"/>
      <line x1="74" y1="42" x2="74" y2="198"/>
    </g>
    <text x="60" y="280" text-anchor="middle" class="label">처분용기</text>
  </g>

  <g transform="translate(355 92)" filter="url(#shadow)">
    <path d="M0 210 L0 48 L74 0 L148 48 L148 210 Z" fill="#c58f63" stroke="#93613e" stroke-width="4"/>
    <path d="M74 58 C102 66 123 91 123 122 C123 164 92 194 74 214 C56 194 25 164 25 122 C25 91 46 66 74 58Z" fill="#ffd45a" stroke="#ad8730" stroke-width="4"/>
    <rect x="63" y="114" width="22" height="84" rx="8" fill="#6f8191"/>
    <rect x="36" y="18" width="76" height="24" rx="12" class="chip"/>
    <text x="74" y="35" text-anchor="middle" class="micro">뒷채움재</text>
    <rect x="41" y="52" width="66" height="24" rx="12" class="chip"/>
    <text x="74" y="69" text-anchor="middle" class="micro">완충재</text>
    <text x="74" y="250" text-anchor="middle" class="label">공학적 방벽</text>
  </g>

  <g transform="translate(568 72)" filter="url(#shadow)">
    <path d="M0 266 L0 56 L90 10 L170 34 L260 0 L290 32 L290 266 Z" fill="url(#soil)" stroke="#9a684c" stroke-width="4"/>
    <path d="M0 186 C52 157 92 170 132 143 C188 105 219 121 290 70 L290 266 L0 266 Z" fill="url(#rock)" opacity=".92"/>
    <path d="M45 86 L124 140 L186 114 L250 158" fill="none" stroke="#704c38" stroke-width="5" opacity=".5"/>
    <rect x="82" y="132" width="34" height="96" rx="12" fill="#d9e4ea" stroke="#657b8d" stroke-width="4"/>
    <path d="M99 228 C116 246 151 260 208 250" fill="none" stroke="#5a7184" stroke-width="5" stroke-linecap="round"/>
    <path d="M124 236 C145 224 174 220 215 224" fill="none" stroke="#5a7184" stroke-width="4" stroke-linecap="round"/>
    <path d="M72 54 L72 126" stroke="#536b7d" stroke-width="5"/>
    <path d="M96 42 L96 126" stroke="#536b7d" stroke-width="5"/>
    <path d="M60 54 L108 54" stroke="#536b7d" stroke-width="5"/>
    <g fill="#66aa73">
      <circle cx="230" cy="30" r="9"/><rect x="226" y="38" width="7" height="20" rx="3"/>
      <circle cx="254" cy="46" r="8"/><rect x="251" y="53" width="6" height="18" rx="3"/>
      <circle cx="204" cy="54" r="8"/><rect x="201" y="61" width="6" height="18" rx="3"/>
    </g>
    <rect x="20" y="2" width="138" height="26" rx="13" class="chip"/>
    <text x="89" y="20" text-anchor="middle" class="micro">처분용기 포장시설</text>
    <rect x="203" y="122" width="64" height="26" rx="13" class="darkchip"/>
    <text x="235" y="141" text-anchor="middle" class="whitetext">수직갱</text>
    <rect x="104" y="240" width="154" height="28" rx="14" class="darkchip"/>
    <text x="181" y="259" text-anchor="middle" class="whitetext">처분터널 및 처분공</text>
    <text x="142" y="304" text-anchor="middle" class="label">자연 방벽</text>
  </g>

  <g stroke="#9aa8b6" stroke-width="4" stroke-linecap="round" opacity=".55">
    <path d="M142 216 H170"/>
    <path d="M312 216 H345"/>
    <path d="M516 216 H558"/>
  </g>
</svg>
